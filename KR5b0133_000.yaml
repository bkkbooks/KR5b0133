body:
  text: 孝道吳許二真君傳虞五許真君名遜字敬之則𣈆代方外之士洞曉祕妙神仙之術孝道之微通感神靈出入無間變現竒異當代賢逹莫得測其由焉望本髙陽隋𣈆過江時吳𣈆初分英雄未簡聖上敬焉王敦師焉郭璞益焉合朝宰貴畢詞厚意親昵不倦矣乃卜勝於豫章宅在其中名遊帷府時共十二真君為友內師事吳君吳君名猛字世雲迤邐卜築間居左右更相勸勉修飛升之妙法救人民之禍害時建昌縣上遼江畔有一大蛇身長數里要截水路四十餘里毒裂山石氣蹙風雲驚駭人民吞噬行旅輸租納稅疲於道路商旅舟楫蔽於不通州縣長吏計無所出遂於蛇穴山西北四十餘里置丘轉輸名曰赤倉供承租賦陸路般運逾山越嶺人力懈怠時吳許二君拱揖相謂曰吾等積德纍業所翼利民不能為人除害何以彰余道德矣於是吳君率領弟子約三百人歡同往殺蛇恐衆心不真而有徊惑妨我大事疑於衆心乃於化民亭採薪爇火取炭化人須臾之聞變三百美女渾於衆中明旦早呼驗其邪正二百九十九人皆染炭墨唯我許君洞逹玄微澄心寂慮苞藏六合上應九真現朗月於水中豈愛染而能著于時吳君仰止而歎訝焉為人除害非子不可乃邀許君二人同往去蛇十里吳君挺特而前蛇縱其蠆毒噓吸雲霧眩目奪日舉首峨天見聞之人莫不懾懼匪神仙志道之士安龍戮力而絶滅者焉吳君當斯之時心有忌憚我許君名繼仙籙道應玄元佩三萬六千之神符尚無極至真之妙法威力自在與奪應機豈爾一毒而能縱暴矣遂拽裾叱吒挺刃而殺之其蛇腹中毒類無數迸散奔走裂地通江因名其路為蛇子徑其地為蛇骨洲于時蛇骨積纍如丘流血知塍至今蹤迹見在時長沙大守賈府君面辭天闕作鎮長沙異政臨民褰惟問俗唯有一女姿容端正志性妹美久求良壻不愜乃心父毋哀憐佇光門望忽有一士自遠慕親形貌無雙詞林獨步竊得慎姓説他門風神彩汪洋堪為人表府君舉家欣喜欽敬而納之婚娉巳來綿歷歲序後時時告别涉旬月而一還虛往實歸悉是金銀錦帛府君未詳其事合宅不無敬憚為府君家珍寶盈庭資財無數子壻若是何福如之家人乃為歌曰天生慎郎名家子第質我珠五實謂佳壻後知許君為國除害志利人民伐獸殺蛇自疑禍及遂乃謁許君於公館幻惑英賢罷公會於郵亭告歸安寢時不料飲酒失度龍光外搖許君察其事乃説而變化矣許君迫逐至於龍沙及變為牛以為潛匿許君知之謂弟子施氏名道乞曰此蛟侵害百姓非少變化無常吾今與爾共除此害吾令才年四十其蛟夀歷千年吾亦為牛恐子不讖吾將手巾於左膊為白駱牛無伊相敵汝可助劒擊之言訖視之龍牛宛在許君亦化而抵之爭力之間施子挺劒而擊傷龍一足龍力竭而走從一泉口入地徑至長沙而歸賈君之宅其泉口後人號為橫泉井焉至今見在其龍却化為人歸語妻子白於賈君曰昨在豫章遇賊劫掠被傷一足其瘡痛楚卒不可言邂逅之間不存性命君聞之驚懼不能巳矣尋使求覔醫人道路相望許君尋其蹤迹又到長沙於市乃知其由謂求醫使曰吾曉醫術使人邀請至府府君親迎許君許君縷言其由方知被千歲老蛟所魅許君因請除害府君不信恐許君所誤乃曰僕之女壻愼氏親姻滿朝識故甚衆唯君從容但盧有誤人情可惜也許君云公不信自往報云君得醫人姓許從豫章來慎郎不驚是知真偽府君從之愼郎聞之驚𢣷止府君不令許君入門許君巳至堂前厲聲喝之其龍揭壁而走府君合宅大懼乃再邀問許君許君又云公宅下五尺巳被蛟作成潭訖尋使人令掘五尺下悉是水無底其龍巳有二子許君令呼見之以水噴亦變為龍形如小艇又云龍妻上分是人一半是龍訖亦以水噴尋變化初欲殺之府君乞存其女許君噴之回形復舊其龍兒及大龍悉應手而殺之府君驚惶怖懼悲歎久之許君但令移家須臾之間舊宅沈沒水深百丈因乃號為潭州矣其龍血入地從地湧出變為一鐡柱見在洪州南塘去城二百四十步其柱存焉銘云鐡柱若亞其龍再與吾當復出鐵柱若正其龍永除且神仙之人無幽不察千變萬化皎在目前志為生民除其禍害豈妖異幻惑能為長久哉且萬丈堅冰覩太陽而散釋千年魑魅逢至聖而消亡更能鍊行通玄合宅輕舉震鴻聞於萬古傳法教於後來若能守道全真知身是幻澄慮虛寂補益浮生則九真之瑶臺不離於跬步矣孝道本起兖州剛輔縣髙平鄉九原里有一至人姓蘭不示其名號曰蘭公義居百人同心合德志行孝行時戚得斗中真人號孝悌王即先王之次弟明王之兄也孝經云昔者明王之以孝治天下也斯之謂歟以蘭公孝道之志通於神明遂降示蘭公孝道根本言先王為日中王明王為月中王又云先王玄氣為大道明王始氣為至道孝悌王元氣散為孝道此三者起由玄元始氣也孝悌王與先王明分作銅符鐵劵劵中徴許氏陽氏陽則𣈆時徵為氏陽縣令氏陽縣蜀郡所管為孝道之師傳襲孝道誘進後代除邪去逆修心鍊行則去仙道不遠于旨孝悌王與蘭公遊於蜀郡路傍見並三塜謂蘭公曰此三冢是仙人冢可囑上言塜中有仙人欲崇孝道宜須榜示行往移其道路勿妨仙人行往也言訖隱形不知所之蘭公依言聞於上上執蘭公云其妖異幻惑詰之公執之云賈府君曰承如君言吾崇孝道必若妄謬誅其九族囚禁蘭公公再思之承孝悌王之言且孝悌隱化一事差錯處身何堪憂幽之間不無愁悶入夜作夢夢有一人語公勿憂但安心定慮矣明日蜀太守府君領公開冢公但言第一冢中有仙真骨巳飛化升仙去訖有黃仙衣一領第二冢有一人可年二十潔白美麗猶如睡覺第三塜有白骨相連皮肉未生生亦仙矣依此言之必請無慮蘭公夢覺欣喜而頗言府君執縳蘭公往而開塜問公第一冢中有何物公答云有真仙骨得仙去矣有黃仙衣一領開視果如其言入問第二塜中有何物公答云有一人可年二十潔白美麗猶如睡覺開視宛如其言其仙人語云今日是我生日復見黃衣一領問第三塜中何物公答云有白骨相連皮肉未生發看亦然府君乃取黃衣著之不勝過與蘭公蘭公度與塜中仙人著輕舉飛騰虛空府君大怖叩頭辭謝蘭公請立孝道矣其人仙飛去或十日而一歸府庭府君見之不覺倒展而迎候後或十日二十日一歸府君敬迓之不能巳矣且志道通靈匪凡者之能測行善獲福乃今古而共傳足知萬物之中唯人為貴人子之道固合棄短而從長況昔明王之以孝治天下後之君子豈不以道德而理身哉蘭公受孝悌王旨令將銅符鐵券送達黃堂觀乃是諶姆所居之宅諶姆即吳中一貞毋也不顯其姓諱以道德為事焉毋於吳市見有一兒年四五拱而拜毋求為義兒諶姆示之云你年十五須侍所生之母何得棄本逐末義為我兒我若受汝殊乖禮律矣兒跪謝而去後經數月變其本身又為三歲小兒來於諶姆邊啼號復無人志認諶姆見是嬰孩孤露心甚愍念携抱將歸愛惜將養不異腹生過於毋子漸至長大智慧自然通於神明感其靈瑞行履之處消災去禍既至成立供侍諶姆甘旨有敘晨昏不虧諶姆憐之為求妻室其兒拱揖出於中庭白諶姆曰兒是先王次弟明王之兄也我身為孝悌王託寄阿毋養育綿歷歲序欲興孝道遷延至今天是我父地是我毋日是我兄月是我弟天上地上唯我獨尊五色慶雲覆我一身何用婦乎乃拜謝阿毋請將所居之宅開為孝門諶姆慈悲不違兒意遂立其住宅名黃堂觀焉兒遂捧授姆銅符鐡劵拜辭姆而去時吳君猛與許君遜聞之遂往黃堂拜謁諶姆請其孝道之法諶姆乃授與銅符鐵劵劵中徵許氏陽一門無猛名字猛乃却拜許君為師許君因傅其妙法授與周彭陳時旴甘曽鍾施黃吳劉沈等十二真君並以崇於孝道常以惠澤流布於人皇天無親惟德是輔民無常懷懷於德仁內修玄微上應無極悉舉家白日升仙唯許君一人德合九真名在仙籙乃上皇所定後學勤苦而成真者哉轉授法諸君乃精修而獲輕舉矣遊帷觀東二百五十步有投龍堙堙下有潭潭水泓澄莫測其深淺潭中有龍潛伏久之莫知其年代斯境百姓堰其潭水澆溉田疇有時禾稼栽植所冀秋成人愁亢陽天久不雨田父集會精意禱請于時甘澤將降隂雲上升士庶有相慶之詞境邑獲豐稔之望匪我地靈景勝神仙窟宅豈得福祐資我逺近之人哉從𣈆元康二年真君舉家飛升之後至唐元和十四年約五百六十二年遞代相承四鄉百姓聚會於觀設黃籙太齋邀請道流三日三夜升壇進表上逹玄元作禮焚香克意誠請存亡獲福方休暇焉鐫劵投龍悉歸斯潭洞矣真君𣈆咸寧元年𣈆武帝徵為蜀郡氏陽令初到任所承前當撥亂之際貴在奉公縱百姓寃屈無能申理文書堆案囚徒溢獄許君一到咸悉除之如寶鏡照形容利劒剸犀象寃者得雪屈者全伸闔境歌直筆之能百姓解倒懸之急當縣人吏枉撓取取受者匹錢數悉預知之每誡朂典吏云爾但行直實之心從於君命何事不可汝昨為文案斷事取錢若干復在其所如何其典吏聞之一一言實不敢拒諱然亦不罪自兹以往汝等人吏之體承合竭力事君苟徒撓人利已非人子之事也因兹吏人各自相勉真君與吳君郭璞三人見王敦敦曰吾欲謀大事請三先生為吾決疑吉之與凶不得妄議言吉則可不得道凶三人應聲道凶王敦曰何也三人曰破兵敗將捨順取逆軍人佪惑萬姓不親大凶之象王敦聞之大怒欲殺三人且云十夜夢一木破天汝等以為非嘉兆何謬言哉吳君曰一木破天未字也公宜未可妄動敦色變又令璞筮之璞曰無成敦不悅曰豫夀幾何璞曰公若舉事禍將不久若還武昌則夀未可量也敦曰君夀幾何璞曰豫夀盡今日日中敦令武士擒璞斬之許君舉杯擲起化為白鴿飛統梁棟敦舉目巳失二君所在敦後竟敗夫滄海之水非尺寸之所量神仙之人非小智而能測我吳許二君日神術貫天地變化洞精靈有道則見無道則隱豈庸瑣之智而能利害邪言訖而莫知所之矣明日午時王敦使五音兒收璞於河邊欲殺之屬水暴漲遂殺不得令引上果到皂莢樹下五音兒拔劒云吾昔日得郭君錦袍一領濟我飢寒未有恩報云何遇我殺之身命委亂今果相逢乃挺劒謂王敦日無道之人輒起兵作亂枉殺平人天必誅之敦後果被五音見所滅矣許君與吳君從金陵附船歸於豫章謂船主曰汝須閉戶安坐吾自為爾乘駕乘駕之時輒不用窺覘若違我語爾當不吉言訖乃使二龍負船騰空而去船主但聞船行疾速之甚矣船巳到廬山頂上船底刺石聲厲船主聞之恐船過淺被砂石所損潛乃開䑳戶看之見有二龍負船見人驚散許君乘龍而去吳君步水而歸至落星灣水中見有一獸眼大如車輪吳君云此獸在於江南土地緣江人民不獲富饒商旅往來阻於上下吾不除之何以濟民患難矣遂乃擲劒中其目而殺之矣夫巳欲立而立人巳欲逹而達人苦不存恤黎氓去除暴惡何以遂九真之仙聖成厲古之功勳哉真君於𣈆元康二年八月十五日合家良賤四十餘口宅宇雞犬一時升仙合村鄉閭悉見頂禮久之當年府司聞奏後牽勑差使造宅及造觀其蜀郡百姓聞之不逺數千里而來躬親求視特為造仙壇以報恩德兼并及為别立祠堂號為仙聖堂至今儼然雕飾每至升仙之日朝拜及齋戒不闕真君未升天之時宴坐一錦帷將捨與黃堂觀真君合宅升仙升仙之後其帷從空而下歸於舊宅之地虛空飛遊圍繞周回經得三日還復升天奉勑遊惟之地賜額造觀因名為遊帷觀升仙後王函之中留詩教兩卷犢車一乘石曰一面銅劒二口扇函一具時徐登為豫章太守使人取犢車至城中身未沐浴即欲看之留待明日仙聖恐觸不令我慢其車尋五色雲中飛歸遊帷觀太守不復得見至今年代雖遙其物並在帷二劒萬天師入內云進上內中供食其車及諸物並在其觀中每至正月五月八月並以十五日朝禮建齋誦讃行道為國王大臣人民消災祈福至今相承不絶真君於𣈆咸和二年徴為氏陽縣今官滿歸宅上頻徴請不赴勑命上亦委以手詔不載擾亂唯與十二仙君更相勉勵內修不二之法神仙之術經于八年至元康二年八月十五日合宅飛升雞犬悉去舊宅壇井儼然而存承二代姪男簡承宗繼世為道士修持供養慱受孝道𣈆永和三年勑再為罝觀至貞觀元年國之不崇人之踈索觀宇寥落有似寂寞焉至永淳三年奉勑再興孝道承代傅香姪男簡簡男卿長長男法強強男靈曜曜姪孝通通男叔嗣息嗣息法胤胤姪法恭恭姪景陽陽男顒龍龍男承觀觀男道超超男元樞樞男玄基基男紹圭圭男文椘椘男王仙姪法真真姪皓然矣孝道吳許二真君傳
